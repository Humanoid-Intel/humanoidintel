name: Hourly News Agent

on:
  schedule:
    # Run every 2 hours at :05 (cost optimization — cuts API spend ~50%)
    - cron: '5 */2 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # full history for rebase

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news agent
        env:
          PUBLISH_MODE: auto
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          GOOGLE_NEWS_API_KEY: ${{ secrets.GOOGLE_NEWS_API_KEY }}
          X_POSTING_ENABLED: 'true'
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          LINKEDIN_ENABLED: 'true'
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          NOTIFICATION_WEBHOOK: ${{ secrets.NOTIFICATION_WEBHOOK }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: npx tsx agent/index.ts

      - name: Regenerate search index
        run: npx tsx scripts/generate-search-index.ts

      - name: Regenerate ticker
        run: npx tsx scripts/generate-ticker.ts

      - name: Commit and push changes
        run: |
          git config user.name "humanoidintel-bot"
          git config user.email "bot@humanoidintel.ai"

          # Check for changes
          NEW_ARTICLES=$(git status --short content/news/ | grep "^??" | wc -l | tr -d ' ')
          STATIC_CHANGED=$(git diff --name-only public/search-index.json public/ticker-data.json 2>/dev/null | wc -l | tr -d ' ')
          FUNDING_CHANGED=$(git diff --name-only content/data/funding-rounds.json 2>/dev/null | wc -l | tr -d ' ')
          JOBS_CHANGED=$(git diff --name-only content/data/jobs.json 2>/dev/null | wc -l | tr -d ' ')

          # Always persist X/LinkedIn posting state files so daily count/dedup survives across runs
          SOCIAL_FILES=""
          for f in agent/.x-posted-hashes.json agent/.x-daily-count.json agent/.linkedin-posted-hashes.json agent/.linkedin-daily-count.json; do
            [ -f "$f" ] && git add "$f" 2>/dev/null && SOCIAL_FILES="$SOCIAL_FILES $f"
          done
          X_STATE_CHANGED=$(git diff --cached --name-only $SOCIAL_FILES 2>/dev/null | wc -l | tr -d ' ')

          if [ "$NEW_ARTICLES" -gt "0" ] || [ "$STATIC_CHANGED" -gt "0" ] || [ "$FUNDING_CHANGED" -gt "0" ] || [ "$JOBS_CHANGED" -gt "0" ] || [ "$X_STATE_CHANGED" -gt "0" ]; then
            [ "$NEW_ARTICLES" -gt "0" ] && git add content/news/*.md
            git add public/search-index.json public/ticker-data.json 2>/dev/null || true
            [ "$FUNDING_CHANGED" -gt "0" ] && git add content/data/funding-rounds.json
            [ "$JOBS_CHANGED" -gt "0" ] && git add content/data/jobs.json

            COMMIT_MSG="feat(content): auto-publish ${NEW_ARTICLES} article(s) + refresh data $(date -u '+%Y-%m-%d %H:%M UTC') [bot]"
            [ "$NEW_ARTICLES" -eq "0" ] && COMMIT_MSG="chore(data): refresh search-index + ticker $(date -u '+%Y-%m-%d %H:%M UTC') [bot]"
            [ "$FUNDING_CHANGED" -gt "0" ] && [ "$NEW_ARTICLES" -eq "0" ] && COMMIT_MSG="feat(funding): auto-update funding rounds $(date -u '+%Y-%m-%d %H:%M UTC') [bot]"
            [ "$JOBS_CHANGED" -gt "0" ] && [ "$NEW_ARTICLES" -eq "0" ] && [ "$FUNDING_CHANGED" -eq "0" ] && COMMIT_MSG="feat(jobs): sync job board listings $(date -u '+%Y-%m-%d %H:%M UTC') [bot]"

            git commit -m "$COMMIT_MSG"

            # Retry push up to 3 times with fetch+rebase to handle concurrent pushes
            for i in 1 2 3; do
              git fetch origin main
              git rebase origin/main && git push origin main && break
              echo "⚠️ Push attempt $i failed, retrying..."
              sleep 2
            done

            echo "✅ Pushed: $NEW_ARTICLES new articles"
          else
            echo "ℹ️ No changes to push"
          fi

      - name: Build health check
        if: success()
        run: |
          echo "✅ Push complete — Cloudflare Pages will auto-deploy from main"
